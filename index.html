<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Golatico 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --tb: 58px; }

    html, body {
      height: 100%; overflow: hidden; background: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }

    /* ── Toolbar ── */
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      -webkit-transform: translate3d(0,0,0); transform: translate3d(0,0,0);
      height: calc(var(--tb) + env(safe-area-inset-top, 0px));
      padding-top: env(safe-area-inset-top, 0px);
      padding-left: 10px; padding-right: 10px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 1px 12px rgba(0,0,0,0.07);
      display: flex; align-items: center; gap: 6px;
      overflow-x: auto;
    }
    #toolbar::-webkit-scrollbar { display: none; }

    .sep { width: 1px; height: 28px; background: rgba(0,0,0,0.1); flex-shrink: 0; }

    /* Person buttons */
    .pbtn {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      border: 2.5px solid transparent; cursor: pointer;
      font-size: 13px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s, border-color .12s;
      -webkit-tap-highlight-color: transparent;
    }
    .pbtn.on { border-color: #111; transform: scale(1.15); }

    /* Tool group */
    .tgroup { display: flex; gap: 2px; background: rgba(0,0,0,0.06); border-radius: 10px; padding: 3px; flex-shrink: 0; }
    .tbtn {
      width: 40px; height: 40px; border-radius: 8px; border: none;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .1s; -webkit-tap-highlight-color: transparent;
    }
    .tbtn.on { background: #5c5ce0; }
    .tbtn.on svg { stroke: white; }
    .tbtn svg { width: 20px; height: 20px; stroke: #444; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .badge {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800;
      border: 2px solid rgba(255,255,255,0.5);
    }
    .tbtn.love-hint-on .badge { animation: lovepulse .4s ease-in-out infinite alternate; }
    @keyframes lovepulse { to { transform: scale(1.22); } }

    /* Day tabs (mobile only) */
    #day-tabs { display: none; gap: 4px; flex-shrink: 0; }
    .dbtn {
      padding: 6px 11px; border-radius: 12px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.7);
      -webkit-tap-highlight-color: transparent; white-space: nowrap; flex-shrink: 0;
    }
    .dbtn.on { color: white; outline: 2px solid #111; outline-offset: 1px; }

    /* Undo */
    .abtn {
      width: 36px; height: 36px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1);
      background: transparent; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .abtn svg { width: 18px; height: 18px; stroke: #555; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    /* Sync dot */
    #sync { width: 7px; height: 7px; border-radius: 50%; background: #30d158; flex-shrink: 0; margin-left: auto; transition: background .3s; }
    #sync.busy { background: #ff9f0a; }
    #sync.err  { background: #ff453a; }
    #sync.off  { background: #aaa; }

    /* ── Board scroll container ── */
    #wrap {
      position: fixed;
      top: calc(var(--tb) + env(safe-area-inset-top, 0px));
      left: 0; right: 0;
      bottom: env(safe-area-inset-bottom, 0px);
      overflow: auto; -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
      background: #e5e5e5;
    }

    /* ── Board ── */
    #board { display: flex; min-height: 100%; }

    /* ── Day panels ── */
    .panel { position: relative; flex-shrink: 0; }
    .panel-img {
      display: block;
      height: calc(100dvh - var(--tb) - env(safe-area-inset-top, 0px));
      width: auto; max-width: none;
      pointer-events: none; -webkit-user-drag: none;
    }
    .slayer { /* stamps layer */
      position: absolute; inset: 0;
      pointer-events: none; /* individual stamps opt back in */
    }
    .clayer { /* canvas layer */
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── Stamps ── */
    .stamp {
      position: absolute; transform: translate(-50%, -50%);
      pointer-events: all; touch-action: none;
      cursor: grab; line-height: 1;
      user-select: none; -webkit-user-select: none;
    }
    .stamp.sel .like { outline: 2.5px dashed rgba(92,92,224,0.9); outline-offset: 3px; }
    .stamp.sel .love { outline: 2.5px dashed rgba(92,92,224,0.9); outline-offset: 3px; border-radius: 8px; }

    .like {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 1px 6px rgba(0,0,0,0.3);
    }
    .love {
      display: flex; flex-direction: column; align-items: center; gap: 0;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35));
    }
    .love-e { font-size: 34px; line-height: 1; }
    .love-l { font-size: 9px; font-weight: 800; margin-top: -2px; }

    /* ── Floating love preview ── */
    #love-float {
      position: fixed; pointer-events: none; z-index: 500;
      font-size: 28px; line-height: 1;
      transform: translate(-50%, -150%) scale(0);
      transition: transform .15s cubic-bezier(.34,1.56,.64,1);
    }
    #love-float.show { transform: translate(-50%, -150%) scale(1); }

    /* ── Trash zone ── */
    #trash {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom,0px) + 20px);
      left: 50%; transform: translateX(-50%) translateY(110px);
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      z-index: 300; pointer-events: none;
      transition: transform .26s cubic-bezier(.34,1.56,.64,1), opacity .2s;
      opacity: 0;
    }
    #trash.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: all; }
    #trash-ring {
      width: 62px; height: 62px; border-radius: 31px;
      background: rgba(255,69,58,0.1); border: 2px dashed rgba(255,69,58,0.45);
      display: flex; align-items: center; justify-content: center; font-size: 24px;
      transition: background .15s, border-color .15s, transform .15s;
    }
    #trash.hot #trash-ring { background: #ff453a; border-color: #ff453a; transform: scale(1.15); }
    #trash-label { font-size: 11px; font-weight: 600; color: rgba(255,69,58,0.65); }
    #trash.hot #trash-label { color: #ff453a; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: calc(env(safe-area-inset-bottom,0px) + 14px);
      left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.76); color: white;
      font-size: 12px; padding: 7px 16px; border-radius: 20px;
      pointer-events: none; z-index: 700; white-space: nowrap;
      opacity: 0; transition: opacity .22s;
    }
    #toast.show { opacity: 1; }

    /* ── Desktop context menu ── */
    #ctxmenu {
      position: fixed; z-index: 600; display: none;
      background: white; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px;
      padding: 4px; box-shadow: 0 8px 28px rgba(0,0,0,0.12); min-width: 160px;
    }
    #ctxmenu button {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 9px 13px; background: transparent; border: none;
      font-size: 14px; cursor: pointer; border-radius: 8px;
      font-family: inherit; color: #ff453a;
    }
    #ctxmenu button:hover { background: rgba(0,0,0,0.04); }

    /* ── Mobile layout ── */
    @media (max-width: 768px) {
      #day-tabs { display: flex; }
      #board { display: block; }
      .panel { display: none; width: 100vw; }
      .panel.active { display: block; }
      .panel-img { width: 100%; height: auto; }
    }
  </style>
</head>
<body>

<div id="toolbar">
  <button class="pbtn on" id="pb-N" style="background:#7B2FBE;color:white"   onclick="setPerson('N')">N</button>
  <button class="pbtn"    id="pb-A" style="background:#D4378C;color:white"   onclick="setPerson('A')">A</button>
  <button class="pbtn"    id="pb-L" style="background:#F5C400;color:#3a2800" onclick="setPerson('L')">L</button>
  <button class="pbtn"    id="pb-I" style="background:#2196F3;color:white"   onclick="setPerson('I')">I</button>
  <div class="sep"></div>
  <div class="tgroup">
    <button class="tbtn on" id="tb-stamp" onclick="setTool('stamp')" title="Stamp">
      <span class="badge" id="sbadge" style="background:#7B2FBE;color:white">N</span>
    </button>
    <button class="tbtn" id="tb-pen" onclick="setTool('pen')" title="Pen">
      <svg viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
    </button>
  </div>
  <div class="sep"></div>
  <div id="day-tabs">
    <button class="dbtn on" data-day="thu" style="background:#9B5FC0" onclick="setDay('thu')">Thu 18</button>
    <button class="dbtn"    data-day="fri" style="background:#6BAA3A" onclick="setDay('fri')">Fri 19</button>
    <button class="dbtn"    data-day="sat" style="background:#E8700A" onclick="setDay('sat')">Sat 20</button>
  </div>
  <div class="sep"></div>
  <button class="abtn" onclick="undo()" title="Undo (⌘Z)">
    <svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
  </button>
  <div id="sync"></div>
</div>

<div id="wrap">
  <div id="board">
    <div class="panel active" id="panel-thu" data-day="thu">
      <img class="panel-img" src="./thursday.jpg" draggable="false">
      <canvas class="clayer"></canvas>
      <div class="slayer"></div>
    </div>
    <div class="panel" id="panel-fri" data-day="fri">
      <img class="panel-img" src="./friday.jpg" draggable="false">
      <canvas class="clayer"></canvas>
      <div class="slayer"></div>
    </div>
    <div class="panel" id="panel-sat" data-day="sat">
      <img class="panel-img" src="./saturday.jpg" draggable="false">
      <canvas class="clayer"></canvas>
      <div class="slayer"></div>
    </div>
  </div>
</div>

<div id="love-float"></div>

<div id="trash">
  <div id="trash-ring">🗑</div>
  <span id="trash-label">Drop to delete</span>
</div>

<div id="ctxmenu">
  <button onclick="ctxDelete()">🗑 Remove stamp</button>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
'use strict';

// ── Config ────────────────────────────────────────────────────────────────────
const FB_CONFIG = {
  apiKey: 'AIzaSyDqCWUi6fg4zYTz-SR9Al_eOWwAe0cciFo',
  authDomain: 'golatico-dd5e9.firebaseapp.com',
  databaseURL: 'https://golatico-dd5e9-default-rtdb.firebaseio.com',
  projectId: 'golatico-dd5e9',
  storageBucket: 'golatico-dd5e9.firebasestorage.app',
  messagingSenderId: '689871566233',
  appId: '1:689871566233:web:26a49441f60069d46d4f08',
};
const PERSONS = {
  N: { color: '#7B2FBE', text: 'white',   emoji: '👅' },
  A: { color: '#D4378C', text: 'white',   emoji: '⭐' },
  L: { color: '#F5C400', text: '#3a2800', emoji: '🔥' },
  I: { color: '#2196F3', text: 'white',   emoji: '🍞' },
};
const LOVE_MS = 500; // hold duration for love stamp

// ── App state ─────────────────────────────────────────────────────────────────
let person = 'N';
let tool   = 'stamp';
let day    = 'thu';
let history   = []; // undo stack (local session)
let strokes   = {}; // pen strokes per panel id
let stampsRef = null;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);
const board    = $('board');
const wrap     = $('wrap');
const loveFloat = $('love-float');
const trashEl  = $('trash');
const syncEl   = $('sync');
const ctxMenu  = $('ctxmenu');

// ── Firebase ──────────────────────────────────────────────────────────────────
try {
  firebase.initializeApp(FB_CONFIG);
  const db = firebase.database();
  stampsRef = db.ref('golatico/stamps');

  stampsRef.on('child_added', snap => {
    if (!document.querySelector(`[data-id="${snap.key}"]`))
      renderStamp({ ...snap.val(), id: snap.key });
  });
  stampsRef.on('child_changed', snap => {
    const el = document.querySelector(`[data-id="${snap.key}"]`);
    if (el) { el.style.left = snap.val().px + '%'; el.style.top = snap.val().py + '%'; }
  });
  stampsRef.on('child_removed', snap => {
    document.querySelector(`[data-id="${snap.key}"]`)?.remove();
  });
  db.ref('.info/connected').on('value', s => {
    syncEl.className = s.val() ? '' : 'off';
  });
} catch (e) {
  syncEl.className = 'err';
}

function fbBusy(promise) {
  syncEl.className = 'busy';
  promise.then(() => syncEl.className = '').catch(() => syncEl.className = 'err');
}

// ── Panel canvas ──────────────────────────────────────────────────────────────
document.querySelectorAll('.panel').forEach(panel => {
  strokes[panel.id] = [];
  const img    = panel.querySelector('.panel-img');
  const canvas = panel.querySelector('.clayer');

  const resize = () => {
    const dpr = devicePixelRatio || 1;
    const r   = img.getBoundingClientRect();
    if (!r.width) return;
    canvas.width  = r.width  * dpr;
    canvas.height = r.height * dpr;
    canvas.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
    redrawPanel(panel);
  };
  img.addEventListener('load', resize);
  if (img.complete && img.naturalWidth) resize();
  new ResizeObserver(resize).observe(img);
});

function redrawPanel(panel) {
  const canvas = panel.querySelector('.clayer');
  const c      = canvas.getContext('2d');
  const r      = panel.querySelector('.panel-img').getBoundingClientRect();
  c.clearRect(0, 0, r.width, r.height);
  for (const s of (strokes[panel.id] || [])) {
    if (!s?.points?.length) continue;
    c.strokeStyle = c.fillStyle = s.color;
    c.lineWidth = s.width; c.lineCap = c.lineJoin = 'round';
    c.beginPath(); c.arc(s.points[0].x, s.points[0].y, s.width / 2, 0, Math.PI * 2); c.fill();
    if (s.points.length > 1) {
      c.beginPath(); c.moveTo(s.points[0].x, s.points[0].y);
      s.points.slice(1).forEach(p => c.lineTo(p.x, p.y));
      c.stroke();
    }
  }
}

// ── Toolbar controls ──────────────────────────────────────────────────────────
function setPerson(p) {
  person = p;
  document.querySelectorAll('.pbtn').forEach(b => b.classList.remove('on'));
  $('pb-' + p).classList.add('on');
  const badge = $('sbadge');
  badge.style.background = PERSONS[p].color;
  badge.style.color = PERSONS[p].text;
  badge.textContent = p;
}

function setTool(t) {
  tool = t;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  $('tb-' + t).classList.add('on');
  // canvas only receives pointer events in pen mode
  document.querySelectorAll('.clayer').forEach(c => {
    c.style.pointerEvents = t === 'pen' ? 'all' : 'none';
    c.style.touchAction   = t === 'pen' ? 'none' : 'auto';
  });
}

function setDay(d) {
  day = d;
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.day === d));
  document.querySelectorAll('.dbtn').forEach(b => b.classList.toggle('on', b.dataset.day === d));
  wrap.scrollTop = 0;
}

// ── Stamp placement ───────────────────────────────────────────────────────────
function panelAt(cx, cy) {
  // mobile: always current day panel
  if (window.innerWidth <= 768) return $('panel-' + day);
  // desktop: find panel under pointer
  for (const p of document.querySelectorAll('.panel')) {
    const r = p.getBoundingClientRect();
    if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) return p;
  }
  return null;
}

function placeStamp(cx, cy, type) {
  const panel = panelAt(cx, cy);
  if (!panel) return;
  const r = panel.getBoundingClientRect();
  const data = {
    person, type,
    day: panel.dataset.day,
    px: clamp((cx - r.left) / r.width  * 100, 0, 100),
    py: clamp((cy - r.top)  / r.height * 100, 0, 100),
  };
  if (stampsRef) {
    const ref = stampsRef.push(data);
    const id  = ref.key;
    // Render immediately — child_added dedup check skips it when Firebase confirms
    renderStamp({ ...data, id });
    history.push({ type: 'stamp', id });
    fbBusy(ref);
  } else {
    const s = { ...data, id: 'local_' + Date.now() };
    renderStamp(s);
    history.push({ type: 'stamp', id: s.id });
  }
}

// ── Stamp rendering ───────────────────────────────────────────────────────────
function renderStamp(stamp) {
  const panel = $('panel-' + (stamp.day || 'thu'));
  if (!panel) return;
  const p = PERSONS[stamp.person] || PERSONS.N;

  const el = document.createElement('div');
  el.className      = 'stamp';
  el.dataset.id     = stamp.id;
  el.dataset.person = stamp.person;
  el.style.left     = stamp.px + '%';
  el.style.top      = stamp.py + '%';

  if (stamp.type === 'like') {
    el.innerHTML = `<div class="like" style="background:${p.color};color:${p.text}">${stamp.person}</div>`;
  } else {
    el.innerHTML = `<div class="love">
      <span class="love-e">${p.emoji}</span>
      <span class="love-l" style="color:${p.text};text-shadow:0 0 4px rgba(0,0,0,.5)">${stamp.person}</span>
    </div>`;
  }

  el.addEventListener('touchstart',  onStampTouch,  { passive: false });
  el.addEventListener('mousedown',   onStampMouse);
  el.addEventListener('contextmenu', onCtxMenu);

  panel.querySelector('.slayer').appendChild(el);
}

// ── Stamp interaction (drag → move / tap → select) ────────────────────────────
let dragging  = null;
let dragMoved = false;
let dragOX    = 0, dragOY = 0;
let selected  = null;

function ownerOf(el) { return el.dataset.person || ''; }

function selectStamp(el) {
  if (ownerOf(el) !== person) { toast(`That's ${ownerOf(el)}'s stamp`); return; }
  if (selected) selected.classList.remove('sel');
  selected = el;
  el.classList.add('sel');
  showTrash();
}

function deselect() {
  if (selected) selected.classList.remove('sel');
  selected = null;
  hideTrash();
}

function removeStamp(id) {
  // Remove from DOM immediately (optimistic)
  document.querySelector(`[data-id="${id}"]`)?.remove();
  // Then sync to Firebase so it's gone for everyone
  if (stampsRef && !String(id).startsWith('local_')) {
    fbBusy(stampsRef.child(id).remove());
  }
}

// Trash zone helpers
function showTrash() { trashEl.classList.add('show'); }
function hideTrash() { trashEl.classList.remove('show', 'hot'); }
function overTrash(cx, cy) {
  const r = trashEl.getBoundingClientRect();
  return cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom;
}

// Touch: drag or tap on stamp
function onStampTouch(e) {
  if (e.touches.length > 1) return;
  e.stopPropagation(); // prevent board from starting stamp placement
  e.preventDefault();  // prevent scroll during drag + suppress synthetic click

  dragging  = e.currentTarget;
  dragMoved = false;
  const panel = dragging.closest('.panel');
  const r     = panel.getBoundingClientRect();
  const t     = e.touches[0];
  dragOX = t.clientX - (parseFloat(dragging.style.left) / 100 * r.width  + r.left);
  dragOY = t.clientY - (parseFloat(dragging.style.top)  / 100 * r.height + r.top);

  showTrash();

  document.addEventListener('touchmove',   onTouchDragMove,   { passive: false });
  document.addEventListener('touchend',    onTouchDragEnd);
  document.addEventListener('touchcancel', onTouchDragCancel);
}

function onTouchDragMove(e) {
  if (!dragging) return;
  e.preventDefault();
  dragMoved = true;
  const panel = dragging.closest('.panel');
  const r     = panel.getBoundingClientRect();
  const t     = e.touches[0];
  dragging.style.left = clamp((t.clientX - dragOX - r.left) / r.width  * 100, 0, 100) + '%';
  dragging.style.top  = clamp((t.clientY - dragOY - r.top)  / r.height * 100, 0, 100) + '%';
  trashEl.classList.toggle('hot', overTrash(t.clientX, t.clientY));
}

function onTouchDragEnd(e) {
  if (!dragging) { cleanDrag(); return; }
  const t = e.changedTouches[0];

  if (!dragMoved) {
    selectStamp(dragging);
  } else if (overTrash(t.clientX, t.clientY)) {
    if (selected === dragging) selected = null;
    removeStamp(dragging.dataset.id);
    hideTrash();
  } else {
    fbBusy(stampsRef
      ? stampsRef.child(dragging.dataset.id).update({
          px: parseFloat(dragging.style.left),
          py: parseFloat(dragging.style.top),
        })
      : Promise.resolve());
    hideTrash();
  }
  dragging = null;
  cleanDrag();
}

function onTouchDragCancel() { dragging = null; hideTrash(); cleanDrag(); }

function cleanDrag() {
  document.removeEventListener('touchmove',   onTouchDragMove);
  document.removeEventListener('touchend',    onTouchDragEnd);
  document.removeEventListener('touchcancel', onTouchDragCancel);
  document.removeEventListener('mousemove',   onMouseDragMove);
  document.removeEventListener('mouseup',     onMouseDragEnd);
}

// Mouse: drag or click on stamp (desktop)
function onStampMouse(e) {
  if (e.button !== 0) return;
  e.stopPropagation();

  dragging  = e.currentTarget;
  dragMoved = false;
  const panel = dragging.closest('.panel');
  const r     = panel.getBoundingClientRect();
  dragOX = e.clientX - (parseFloat(dragging.style.left) / 100 * r.width  + r.left);
  dragOY = e.clientY - (parseFloat(dragging.style.top)  / 100 * r.height + r.top);

  showTrash();
  document.addEventListener('mousemove', onMouseDragMove);
  document.addEventListener('mouseup',   onMouseDragEnd);
}

function onMouseDragMove(e) {
  if (!dragging) return;
  dragMoved = true;
  const panel = dragging.closest('.panel');
  const r     = panel.getBoundingClientRect();
  dragging.style.left = clamp((e.clientX - dragOX - r.left) / r.width  * 100, 0, 100) + '%';
  dragging.style.top  = clamp((e.clientY - dragOY - r.top)  / r.height * 100, 0, 100) + '%';
  trashEl.classList.toggle('hot', overTrash(e.clientX, e.clientY));
}

function onMouseDragEnd(e) {
  if (!dragging) { cleanDrag(); return; }

  if (!dragMoved) {
    selectStamp(dragging);
  } else if (overTrash(e.clientX, e.clientY)) {
    if (selected === dragging) selected = null;
    removeStamp(dragging.dataset.id);
    hideTrash();
  } else {
    if (stampsRef) fbBusy(stampsRef.child(dragging.dataset.id).update({
      px: parseFloat(dragging.style.left),
      py: parseFloat(dragging.style.top),
    }));
    hideTrash();
  }
  dragging = null;
  cleanDrag();
}

// Tap trash to delete selected stamp
trashEl.addEventListener('click', () => {
  if (selected) { removeStamp(selected.dataset.id); selected = null; hideTrash(); }
});

// Context menu (desktop right-click on stamp)
let ctxId = null;
function onCtxMenu(e) {
  e.preventDefault();
  ctxId = e.currentTarget.dataset.id;
  ctxMenu.style.left    = Math.min(e.clientX, innerWidth  - 180) + 'px';
  ctxMenu.style.top     = Math.min(e.clientY, innerHeight -  60) + 'px';
  ctxMenu.style.display = 'block';
}
function ctxDelete() {
  if (ctxId) { removeStamp(ctxId); if (selected?.dataset.id === ctxId) { selected = null; hideTrash(); } ctxId = null; }
  ctxMenu.style.display = 'none';
}
document.addEventListener('click',      () => ctxMenu.style.display = 'none');
document.addEventListener('touchstart', () => ctxMenu.style.display = 'none', { passive: true });

// ── Board: stamp placement (touch) ────────────────────────────────────────────
//
// Stamps call e.stopPropagation() on touchstart so these handlers
// never see stamp touches — clean separation.
//
let tapAt = 0, tapX = 0, tapY = 0, tapScrolled = false, pinching = false;
let loveTimer = null;

board.addEventListener('touchstart', e => {
  // Always deselect when touching empty space
  if (!e.target.closest('.stamp')) deselect();

  if (e.touches.length > 1) { pinching = true; clearLoveFloat(); return; }
  if (tool !== 'stamp') return;
  if (e.target.closest('.stamp') || e.target.closest('.clayer')) return;

  tapAt      = Date.now();
  tapScrolled = false;
  tapX       = e.touches[0].clientX;
  tapY       = e.touches[0].clientY;

  clearLoveFloat();
  loveTimer = setTimeout(() => {
    loveFloat.textContent = PERSONS[person].emoji;
    loveFloat.style.left  = tapX + 'px';
    loveFloat.style.top   = tapY + 'px';
    loveFloat.classList.add('show');
    $('tb-stamp').classList.add('love-hint-on');
  }, LOVE_MS);
}, { passive: true });

board.addEventListener('touchmove', e => {
  if (e.touches.length > 1) { pinching = true; clearLoveFloat(); return; }
  if (Math.hypot(e.touches[0].clientX - tapX, e.touches[0].clientY - tapY) > 20) {
    tapScrolled = true;
    clearLoveFloat();
  }
}, { passive: true });

board.addEventListener('touchend', e => {
  const held = Date.now() - tapAt;
  clearLoveFloat();

  if (pinching)             { pinching = false; return; }
  if (tapScrolled)          return;
  if (e.touches.length > 0) return;
  if (tool !== 'stamp')     return;
  if (e.target.closest('.stamp') || e.target.closest('.clayer')) return;

  const t = e.changedTouches[0];
  if (Math.hypot(t.clientX - tapX, t.clientY - tapY) > 20) return;

  placeStamp(t.clientX, t.clientY, held >= LOVE_MS ? 'love' : 'like');
}, { passive: true });

board.addEventListener('touchcancel', () => {
  clearLoveFloat(); pinching = false; tapScrolled = true;
}, { passive: true });

function clearLoveFloat() {
  clearTimeout(loveTimer); loveTimer = null;
  loveFloat.classList.remove('show');
  $('tb-stamp').classList.remove('love-hint-on');
}

// ── Board: stamp placement (mouse / desktop) ──────────────────────────────────
let mouseAt = 0, mouseX = 0, mouseY = 0, mouseMoved = false, mouseLoveTimer = null;

board.addEventListener('mousedown', e => {
  if (!e.target.closest('.stamp')) deselect();
  if (tool !== 'stamp' || e.target.closest('.stamp') || e.target.closest('.clayer')) return;

  mouseAt    = Date.now(); mouseMoved = false;
  mouseX     = e.clientX; mouseY = e.clientY;

  clearMouseLove();
  mouseLoveTimer = setTimeout(() => {
    loveFloat.textContent = PERSONS[person].emoji;
    loveFloat.style.left  = mouseX + 'px';
    loveFloat.style.top   = mouseY + 'px';
    loveFloat.classList.add('show');
    $('tb-stamp').classList.add('love-hint-on');
  }, LOVE_MS);
});

board.addEventListener('mousemove', e => {
  if (Math.hypot(e.clientX - mouseX, e.clientY - mouseY) > 6) {
    mouseMoved = true; clearMouseLove();
  }
  if (loveFloat.classList.contains('show')) {
    loveFloat.style.left = e.clientX + 'px';
    loveFloat.style.top  = e.clientY + 'px';
  }
});

board.addEventListener('mouseup', e => {
  const held = Date.now() - mouseAt;
  clearMouseLove();
  if (tool !== 'stamp' || mouseMoved) return;
  if (e.target.closest('.stamp') || e.target.closest('.clayer')) return;
  placeStamp(e.clientX, e.clientY, held >= LOVE_MS ? 'love' : 'like');
});

board.addEventListener('mouseleave', () => clearMouseLove());

function clearMouseLove() {
  clearTimeout(mouseLoveTimer); mouseLoveTimer = null;
  loveFloat.classList.remove('show');
  $('tb-stamp').classList.remove('love-hint-on');
}

// ── Pen drawing ───────────────────────────────────────────────────────────────
let drawing = false, stroke = null, lastPt = null, activeCanvas = null, activeCtx2d = null;

document.querySelectorAll('.clayer').forEach(canvas => {
  canvas.addEventListener('mousedown',  penStart);
  canvas.addEventListener('mousemove',  penMove);
  canvas.addEventListener('mouseup',    penEnd);
  canvas.addEventListener('mouseleave', penEnd);
  canvas.addEventListener('touchstart', penStart, { passive: false });
  canvas.addEventListener('touchmove',  penMove,  { passive: false });
  canvas.addEventListener('touchend',   penEnd);
});

function penPt(e) {
  const src = e.touches ? e.touches[0] : e;
  const r   = activeCanvas.getBoundingClientRect();
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

function penStart(e) {
  if (tool !== 'pen') return;
  if (e.cancelable) e.preventDefault();
  activeCanvas = e.currentTarget;
  activeCtx2d  = activeCanvas.getContext('2d');
  const pt     = penPt(e);
  lastPt       = pt;
  stroke        = {
    color:   PERSONS[person].color,
    width:   5,
    points:  [pt],
    panelId: activeCanvas.closest('.panel').id,
  };
  drawing = true;
  activeCtx2d.beginPath();
  activeCtx2d.arc(pt.x, pt.y, 2.5, 0, Math.PI * 2);
  activeCtx2d.fillStyle = stroke.color;
  activeCtx2d.fill();
}

function penMove(e) {
  if (!drawing) return;
  if (e.cancelable) e.preventDefault();
  const pt = penPt(e);
  activeCtx2d.beginPath();
  activeCtx2d.moveTo(lastPt.x, lastPt.y);
  activeCtx2d.lineTo(pt.x, pt.y);
  activeCtx2d.strokeStyle = stroke.color;
  activeCtx2d.lineWidth   = stroke.width;
  activeCtx2d.lineCap = activeCtx2d.lineJoin = 'round';
  activeCtx2d.stroke();
  lastPt = pt;
  stroke.points.push(pt);
}

function penEnd() {
  if (!drawing) return;
  drawing = false;
  if (stroke?.points.length) {
    const pid = stroke.panelId;
    strokes[pid] = strokes[pid] || [];
    strokes[pid].push(stroke);
    history.push({ type: 'stroke', panelId: pid, idx: strokes[pid].length - 1 });
  }
  stroke = null; lastPt = null; activeCanvas = null; activeCtx2d = null;
}

// ── Undo ──────────────────────────────────────────────────────────────────────
function undo() {
  const last = history.pop();
  if (!last) return;
  if (last.type === 'stroke') {
    strokes[last.panelId]?.splice(last.idx, 1);
    redrawPanel($(last.panelId));
  } else {
    removeStamp(last.id);
    if (selected?.dataset?.id === last.id) { selected = null; hideTrash(); }
  }
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const ctrl = e.ctrlKey || e.metaKey;
  if (ctrl && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); return; }
  if ((e.key === 'Delete' || e.key === 'Backspace') && document.activeElement === document.body && selected) {
    e.preventDefault();
    removeStamp(selected.dataset.id);
    selected = null; hideTrash();
  }
});

// ── Utility ───────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

let toastTimer;
function toast(msg, ms = 2200) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}
</script>
</body>
