<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Golatico 2026 — Timetable</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --toolbar-h: 62px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --thu: #9B5FC0; --fri: #6BAA3A; --sat: #E8700A;
    }

    html, body {
      font-family: var(--font); background: transparent;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
    }

    #toolbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: calc(var(--toolbar-h) + env(safe-area-inset-top, 0px));
      padding-top: env(safe-area-inset-top, 0px);
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
      display: flex; align-items: center; gap: 4px;
      padding-left: 12px; padding-right: 12px; z-index: 200;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    #toolbar::-webkit-scrollbar { display: none; }
    .tb-sep { width: 1px; height: 28px; background: rgba(0,0,0,0.1); margin: 0 4px; flex-shrink: 0; }

    .person-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2.5px solid transparent; cursor: pointer;
      font-size: 14px; font-weight: 800; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: transform .12s, border-color .12s;
      -webkit-tap-highlight-color: transparent;
    }
    .person-btn.active { border-color: #222; transform: scale(1.15); }

    #day-tabs { display: none; gap: 4px; flex-shrink: 0; }
    .day-btn {
      padding: 6px 12px; border-radius: 14px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.7);
      -webkit-tap-highlight-color: transparent; white-space: nowrap; flex-shrink: 0;
    }
    .day-btn[data-day="thu"] { background: var(--thu); }
    .day-btn[data-day="fri"] { background: var(--fri); }
    .day-btn[data-day="sat"] { background: var(--sat); }
    .day-btn.active { color: white; outline: 2.5px solid #222; outline-offset: 1px; }

    .tool-group { display: flex; gap: 2px; background: rgba(0,0,0,0.05); border-radius: 12px; padding: 3px; flex-shrink: 0; }
    .tb-tool {
      width: 42px; height: 42px; border-radius: 10px;
      border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .1s; -webkit-tap-highlight-color: transparent;
    }
    .tb-tool.active { background: #5c5ce0; }
    .tb-tool.active svg { stroke: white; }
    .tb-tool svg { width: 20px; height: 20px; stroke: #444; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .tool-badge {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800;
      border: 2.5px solid rgba(255,255,255,0.7);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .tb-tool.love-mode .tool-badge { animation: lovepulse .4s ease-in-out infinite alternate; }
    @keyframes lovepulse { from { transform: scale(1); } to { transform: scale(1.2); } }

    .tb-action {
      width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.1); background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .tb-action svg { width: 18px; height: 18px; stroke: #555; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    #sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #30d158; flex-shrink: 0; margin-left: auto; transition: background .4s; }
    #sync-dot.syncing { background: #ff9f0a; }
    #sync-dot.error   { background: #ff453a; }
    #sync-dot.offline { background: #aaa; }

    #love-hint {
      position: fixed; pointer-events: none; z-index: 500; font-size: 32px;
      transform: translate(-50%, -130%) scale(0);
      transition: transform .15s cubic-bezier(.34,1.56,.64,1);
    }
    #love-hint.show { transform: translate(-50%, -130%) scale(1); }

    #workspace-wrap {
      position: fixed;
      top: calc(var(--toolbar-h) + env(safe-area-inset-top, 0px));
      left: 0; right: 0;
      bottom: env(safe-area-inset-bottom, 0px);
      overflow: auto; -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
    }

    #workspace { display: flex; }
    .day-panel { position: relative; flex-shrink: 0; }
    .tt-img {
      display: block;
      height: calc(100dvh - var(--toolbar-h) - env(safe-area-inset-top, 0px));
      width: auto; max-width: none;
      pointer-events: none; user-select: none; -webkit-user-drag: none;
    }

    .draw-canvas  { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    .stamps-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

    .stamp-el {
      position: absolute; transform: translate(-50%, -50%);
      pointer-events: all; user-select: none; -webkit-user-select: none;
      touch-action: none; line-height: 1; cursor: grab;
    }
    .stamp-el:active { cursor: grabbing; }
    .stamp-el.selected { outline: 2.5px dashed rgba(92,92,224,0.9); outline-offset: 5px; border-radius: 50%; }
    .like-stamp {
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 800;
      border: 2px solid white; box-shadow: 0 1px 5px rgba(0,0,0,0.3);
    }
    .love-stamp { display: flex; flex-direction: column; align-items: center; line-height: 1; filter: drop-shadow(0 3px 8px rgba(0,0,0,0.35)); }
    .love-stamp-emoji { font-size: 36px; line-height: 1; display: block; }
    .love-stamp-letter { font-size: 9px; font-weight: 800; margin-top: -2px; }

    #trash-zone {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      left: 50%; transform: translateX(-50%) translateY(120px);
      z-index: 400; pointer-events: none;
      transition: transform .28s cubic-bezier(.34,1.56,.64,1), opacity .22s;
      opacity: 0;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    #trash-zone.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1; pointer-events: all;
    }
    #trash-zone .trash-target {
      width: 64px; height: 64px; border-radius: 32px;
      background: rgba(255,69,58,0.12); border: 2px dashed rgba(255,69,58,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; transition: background .15s, border-color .15s, transform .15s;
    }
    #trash-zone.over .trash-target {
      background: rgba(255,69,58,0.9); border-color: #ff453a;
      transform: scale(1.18);
    }
    #trash-zone .trash-label {
      font-size: 11px; font-weight: 600; color: rgba(255,69,58,0.7);
      letter-spacing: .02em;
    }
    #trash-zone.over .trash-label { color: #ff453a; }

    #ctx-menu {
      position: fixed; background: white;
      border: 1px solid rgba(0,0,0,0.1); border-radius: 12px;
      padding: 5px; z-index: 600; display: none;
      box-shadow: 0 8px 28px rgba(0,0,0,0.12); min-width: 180px;
    }
    #ctx-menu button {
      display: flex; align-items: center; gap: 9px; width: 100%;
      padding: 9px 14px; background: transparent; border: none;
      font-size: 14px; font-family: var(--font); cursor: pointer; border-radius: 8px; white-space: nowrap;
    }
    #ctx-menu button:hover { background: rgba(0,0,0,0.04); }
    #ctx-menu .danger { color: #ff453a; }
    #ctx-menu .normal { color: #333; }

    #toast {
      position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 16px); left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: white;
      font-size: 12px; padding: 7px 16px; border-radius: 20px;
      pointer-events: none; z-index: 700; opacity: 0; transition: opacity .25s; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    @media (max-width: 768px) {
      #day-tabs { display: flex; }
      #workspace { display: block; }
      .day-panel { display: none; width: 100vw; }
      .day-panel.active { display: block; }
      .tt-img { width: 100%; height: auto; }
    }
  </style>
</head>
<body>

<div id="toolbar">
  <button class="person-btn active" id="btn-N" style="background:#7B2FBE;color:white"   onclick="selectPerson('N')">N</button>
  <button class="person-btn"        id="btn-A" style="background:#D4378C;color:white"   onclick="selectPerson('A')">A</button>
  <button class="person-btn"        id="btn-L" style="background:#F5C400;color:#3a2800" onclick="selectPerson('L')">L</button>
  <button class="person-btn"        id="btn-I" style="background:#2196F3;color:white"   onclick="selectPerson('I')">I</button>
  <div class="tb-sep"></div>
  <div class="tool-group">
    <button class="tb-tool active" id="tool-stamp" onclick="selectTool('stamp')">
      <span class="tool-badge" id="stamp-badge" style="background:#7B2FBE;color:white">N</span>
    </button>
    <button class="tb-tool" id="tool-pen" onclick="selectTool('pen')">
      <svg viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
    </button>
  </div>
  <div class="tb-sep"></div>
  <div id="day-tabs">
    <button class="day-btn active" data-day="thu" onclick="setDay('thu')">Thu 18</button>
    <button class="day-btn"        data-day="fri" onclick="setDay('fri')">Fri 19</button>
    <button class="day-btn"        data-day="sat" onclick="setDay('sat')">Sat 20</button>
  </div>
  <div class="tb-sep"></div>
  <button class="tb-action" onclick="undo()">
    <svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
  </button>
  <div id="sync-dot"></div>
</div>

<div id="love-hint"></div>

<div id="workspace-wrap">
  <div id="workspace">
    <div class="day-panel active" id="panel-thu" data-day="thu">
      <img class="tt-img" src="./thursday.jpg" alt="Thursday" draggable="false">
      <canvas class="draw-canvas"></canvas>
      <div class="stamps-layer"></div>
    </div>
    <div class="day-panel" id="panel-fri" data-day="fri">
      <img class="tt-img" src="./friday.jpg" alt="Friday" draggable="false">
      <canvas class="draw-canvas"></canvas>
      <div class="stamps-layer"></div>
    </div>
    <div class="day-panel" id="panel-sat" data-day="sat">
      <img class="tt-img" src="./saturday.jpg" alt="Saturday" draggable="false">
      <canvas class="draw-canvas"></canvas>
      <div class="stamps-layer"></div>
    </div>
  </div>
</div>

<div id="trash-zone">
  <div class="trash-target">🗑</div>
  <span class="trash-label">Drop to delete</span>
</div>
<div id="ctx-menu">
  <button class="normal" onclick="copyStamp(contextStampId); ctxMenu.style.display='none'">⎘ Copy stamp</button>
  <button class="danger" onclick="deleteContextStamp()">🗑 Remove stamp</button>
</div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:            "AIzaSyDqCWUi6fg4zYTz-SR9Al_eOWwAe0cciFo",
  authDomain:        "golatico-dd5e9.firebaseapp.com",
  databaseURL:       "https://golatico-dd5e9-default-rtdb.firebaseio.com",
  projectId:         "golatico-dd5e9",
  storageBucket:     "golatico-dd5e9.firebasestorage.app",
  messagingSenderId: "689871566233",
  appId:             "1:689871566233:web:26a49441f60069d46d4f08"
};
const PERSONS = {
  N: { color: '#7B2FBE', textColor: 'white',   emoji: '😛' },
  A: { color: '#D4378C', textColor: 'white',   emoji: '⭐' },
  L: { color: '#F5C400', textColor: '#3a2800', emoji: '🔥' },
  I: { color: '#2196F3', textColor: 'white',   emoji: '🍞' },
};

let currentPerson='N', currentTool='stamp', currentDay='thu';
let strokes={}, localHistory=[], redoStack=[];
let isDrawing=false, currentStroke=null, activeCanvas=null, activeCtx=null, lastPos=null;
let draggingStamp=null, dragOffX=0, dragOffY=0, dragMoved=false;
let contextStampId=null, selectedStampId=null, clipboardStamp=null, stampsRef;
const LOVE_MS=450;
let pressTimer=null, pressX=0, pressY=0, wasPinch=false;

const loveHint=document.getElementById('love-hint');
const ctxMenu=document.getElementById('ctx-menu');
const syncDot=document.getElementById('sync-dot');
const workspaceWrap=document.getElementById('workspace-wrap');
const workspace=document.getElementById('workspace');

try {
  firebase.initializeApp(firebaseConfig);
  const db=firebase.database(); stampsRef=db.ref('golatico/stamps');
  stampsRef.on('child_added',  s=>{if(!document.querySelector(`[data-id="${s.key}"]`))renderStampEl({...s.val(),id:s.key});});
  stampsRef.on('child_changed',s=>{const d=s.val(),el=document.querySelector(`[data-id="${s.key}"]`);if(el){el.style.left=d.px+'%';el.style.top=d.py+'%';}});
  stampsRef.on('child_removed',s=>document.querySelector(`[data-id="${s.key}"]`)?.remove());
  db.ref('.info/connected').on('value',s=>{syncDot.className=s.val()?'':'offline';});
} catch(e){syncDot.className='error';}

function resizePanelCanvas(panel){
  const img=panel.querySelector('.tt-img'),canvas=panel.querySelector('.draw-canvas');
  const dpr=window.devicePixelRatio||1,rect=img.getBoundingClientRect();
  if(!rect.width||!rect.height)return;
  canvas.width=rect.width*dpr; canvas.height=rect.height*dpr;
  const c=canvas.getContext('2d'); c.setTransform(dpr,0,0,dpr,0,0); redrawCanvas(panel);
}
function initPanel(panel){
  strokes[panel.id]=[];
  const img=panel.querySelector('.tt-img');
  img.addEventListener('load',()=>resizePanelCanvas(panel));
  if(img.complete&&img.naturalWidth)resizePanelCanvas(panel);
  new ResizeObserver(()=>resizePanelCanvas(panel)).observe(img);
}
document.querySelectorAll('.day-panel').forEach(initPanel);

function redrawCanvas(panel){
  const canvas=panel.querySelector('.draw-canvas'),c=canvas.getContext('2d');
  const rect=panel.querySelector('.tt-img').getBoundingClientRect();
  c.clearRect(0,0,rect.width,rect.height);
  for(const s of(strokes[panel.id]||[])){
    if(!s?.points.length)continue;
    c.strokeStyle=c.fillStyle=s.color; c.lineWidth=s.width; c.lineCap=c.lineJoin='round';
    c.beginPath(); c.arc(s.points[0].x,s.points[0].y,s.width/2,0,Math.PI*2); c.fill();
    if(s.points.length>1){c.beginPath();c.moveTo(s.points[0].x,s.points[0].y);for(let i=1;i<s.points.length;i++)c.lineTo(s.points[i].x,s.points[i].y);c.stroke();}
  }
}

function setDay(day){
  currentDay=day;
  document.querySelectorAll('.day-panel').forEach(p=>p.classList.toggle('active',p.dataset.day===day));
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.toggle('active',b.dataset.day===day));
  workspaceWrap.scrollTop=0;
}
function selectPerson(p){
  currentPerson=p;
  document.querySelectorAll('.person-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+p).classList.add('active');
  const pp=PERSONS[p],badge=document.getElementById('stamp-badge');
  badge.style.background=pp.color; badge.style.color=pp.textColor; badge.textContent=p;
}
function selectTool(t){
  currentTool=t;
  document.querySelectorAll('.tb-tool').forEach(b=>b.classList.remove('active'));
  document.getElementById('tool-'+t).classList.add('active');
  document.querySelectorAll('.draw-canvas').forEach(c=>{
    c.style.pointerEvents=t==='pen'?'all':'none';
    c.style.touchAction=t==='pen'?'none':'auto';
  });
}

function getPanelAt(cx,cy){
  if(window.innerWidth<=768)return document.getElementById('panel-'+currentDay);
  for(const p of document.querySelectorAll('.day-panel')){
    const r=p.getBoundingClientRect();
    if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom)return p;
  }
  return null;
}
function placeStamp(cx,cy,type){
  const panel=getPanelAt(cx,cy); if(!panel)return;
  const rect=panel.getBoundingClientRect();
  const data={person:currentPerson,type,day:panel.dataset.day,
    px:Math.max(0,Math.min(100,(cx-rect.left)/rect.width*100)),
    py:Math.max(0,Math.min(100,(cy-rect.top)/rect.height*100))};
  if(stampsRef){
    syncDot.className='syncing';
    const ref=stampsRef.push(data); localHistory.push({type:'stamp',id:ref.key}); redoStack=[];
    ref.then(()=>syncDot.className='').catch(()=>syncDot.className='error');
  }else{const s={...data,id:'local_'+Date.now()};renderStampEl(s);localHistory.push({type:'stamp',id:s.id});redoStack=[];}
}

function renderStampEl(stamp){
  const panel=document.getElementById('panel-'+(stamp.day||'thu')); if(!panel)return;
  const p=PERSONS[stamp.person]||PERSONS['N'];
  const el=document.createElement('div'); el.className='stamp-el'; el.dataset.id=stamp.id; el.dataset.person=stamp.person;
  el.style.left=stamp.px+'%'; el.style.top=stamp.py+'%';
  if(stamp.type==='like'){
    el.innerHTML=`<div class="like-stamp" style="background:${p.color};color:${p.textColor}">${stamp.person}</div>`;
  }else{
    el.innerHTML=`<div class="love-stamp"><span class="love-stamp-emoji">${p.emoji}</span><span class="love-stamp-letter" style="color:${p.textColor};text-shadow:0 0 4px rgba(0,0,0,0.5)">${stamp.person}</span></div>`;
  }
  el.addEventListener('click',e=>{e.stopPropagation();if(!dragMoved)selectStamp(stamp.id);});
  el.addEventListener('mousedown', startDragStamp);
  el.addEventListener('touchstart',startDragStamp,{passive:false});
  el.addEventListener('contextmenu',showCtxMenuFromEvent);
  el.addEventListener('touchstart',startStampCtx,{passive:true});
  el.addEventListener('touchend',  cancelStampCtx);
  el.addEventListener('touchmove', cancelStampCtx,{passive:true});
  panel.querySelector('.stamps-layer').appendChild(el);
}

const trashZone=document.getElementById('trash-zone');

function showTrash(){trashZone.classList.add('visible');}
function hideTrash(){trashZone.classList.remove('visible','over');}
function isOverTrash(cx,cy){
  const r=trashZone.getBoundingClientRect();
  return cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom;
}

function selectStamp(id){
  const el=document.querySelector(`[data-id="${id}"]`); if(!el)return;
  const owner=el.querySelector('.like-stamp')?.textContent?.trim()||el.querySelector('img')?.alt;
  if(owner&&owner!==currentPerson){toast(`That's ${owner}'s stamp`);return;}
  document.querySelectorAll('.stamp-el.selected').forEach(e=>e.classList.remove('selected'));
  selectedStampId=id; contextStampId=id;
  el.classList.add('selected');
  showTrash();
}
function deselectStamp(){
  document.querySelectorAll('.stamp-el.selected').forEach(e=>e.classList.remove('selected'));
  selectedStampId=null; hideTrash();
}
function deleteSelected(){
  if(!selectedStampId)return;
  contextStampId=selectedStampId; selectedStampId=null;
  hideTrash(); deleteContextStamp();
}
trashZone.addEventListener('click',deleteSelected);
trashZone.addEventListener('touchend',e=>{e.preventDefault();deleteSelected();});

function stampOwner(el){
  return el.dataset.person||el.querySelector('.like-stamp')?.textContent?.trim()||'';
}
function startDragStamp(e){
  e.stopPropagation();
  const owner=stampOwner(e.currentTarget);
  if(owner&&owner!==currentPerson){
    // Not your stamp — just select it so owner check shows toast, don't drag
    return;
  }
  clearLovePreview(); dragMoved=false; draggingStamp=e.currentTarget;
  const panel=draggingStamp.closest('.day-panel'),rect=panel.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
  dragOffX=cx-(parseFloat(draggingStamp.style.left)/100*rect.width+rect.left);
  dragOffY=cy-(parseFloat(draggingStamp.style.top)/100*rect.height+rect.top);
  showTrash();
  document.addEventListener('mousemove',moveDragStamp); document.addEventListener('mouseup',stopDragStamp);
  document.addEventListener('touchmove',moveDragStamp,{passive:false}); document.addEventListener('touchend',stopDragStamp);
}
function moveDragStamp(e){
  if(!draggingStamp)return; if(e.cancelable)e.preventDefault(); dragMoved=true;
  const panel=draggingStamp.closest('.day-panel'),rect=panel.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
  draggingStamp.style.left=Math.max(0,Math.min(100,(cx-dragOffX-rect.left)/rect.width*100))+'%';
  draggingStamp.style.top=Math.max(0,Math.min(100,(cy-dragOffY-rect.top)/rect.height*100))+'%';
  trashZone.classList.toggle('over',isOverTrash(cx,cy));
}
function stopDragStamp(e){
  if(!draggingStamp){document.removeEventListener('mousemove',moveDragStamp);document.removeEventListener('mouseup',stopDragStamp);document.removeEventListener('touchmove',moveDragStamp);document.removeEventListener('touchend',stopDragStamp);return;}
  const cx=e?.touches?.[0]?.clientX??e?.clientX??-999;
  const cy=e?.touches?.[0]?.clientY??e?.clientY??-999;
  if(dragMoved&&isOverTrash(cx,cy)){
    // Dropped on trash — delete
    contextStampId=draggingStamp.dataset.id; deleteContextStamp();
    selectedStampId=null;
  } else if(dragMoved&&stampsRef){
    syncDot.className='syncing';
    stampsRef.child(draggingStamp.dataset.id).update({px:parseFloat(draggingStamp.style.left),py:parseFloat(draggingStamp.style.top)}).then(()=>syncDot.className='');
  }
  draggingStamp=null; dragMoved=false; hideTrash();
  document.removeEventListener('mousemove',moveDragStamp); document.removeEventListener('mouseup',stopDragStamp);
  document.removeEventListener('touchmove',moveDragStamp); document.removeEventListener('touchend',stopDragStamp);
}

function showCtxMenuFromEvent(e){
  e.preventDefault(); contextStampId=e.currentTarget.dataset.id;
  ctxMenu.style.left=Math.min(e.clientX,window.innerWidth-200)+'px';
  ctxMenu.style.top=Math.min(e.clientY,window.innerHeight-80)+'px';
  ctxMenu.style.display='block';
}
function deleteContextStamp(){
  if(!contextStampId)return; ctxMenu.style.display='none';
  if(stampsRef&&!contextStampId.startsWith('local_')){syncDot.className='syncing';stampsRef.child(contextStampId).remove().then(()=>syncDot.className='');}
  else document.querySelector(`[data-id="${contextStampId}"]`)?.remove();
  contextStampId=null;
}
document.addEventListener('click',()=>ctxMenu.style.display='none');
document.addEventListener('touchstart',()=>ctxMenu.style.display='none',{passive:true});

let stampCtxTimer=null;
function startStampCtx(e){stampCtxTimer=setTimeout(()=>{contextStampId=e.currentTarget.dataset.id;const t=e.touches[0];ctxMenu.style.left=Math.min(t.clientX,window.innerWidth-200)+'px';ctxMenu.style.top=Math.min(t.clientY,window.innerHeight-80)+'px';ctxMenu.style.display='block';},600);}
function cancelStampCtx(){clearTimeout(stampCtxTimer);stampCtxTimer=null;}

// Love preview helpers — no global isLoveMode flag, use Date.now() at touchend instead
function showLovePreview(x,y){
  loveHint.textContent=PERSONS[currentPerson].emoji;
  loveHint.style.left=x+'px'; loveHint.style.top=y+'px';
  loveHint.classList.add('show');
  document.getElementById('tool-stamp').classList.add('love-mode');
}
function clearLovePreview(){
  clearTimeout(pressTimer); pressTimer=null;
  loveHint.classList.remove('show');
  document.getElementById('tool-stamp').classList.remove('love-mode');
}

// Desktop
workspace.addEventListener('mousedown',e=>{
  if(currentTool!=='stamp'||e.target.closest('.stamp-el')||e.target.closest('.draw-canvas'))return;
  pressX=e.clientX; pressY=e.clientY;
  clearLovePreview();
  pressTimer=setTimeout(()=>showLovePreview(pressX,pressY),LOVE_MS);
});
workspace.addEventListener('mousemove',e=>{
  if(Math.hypot(e.clientX-pressX,e.clientY-pressY)>8)clearLovePreview();
  if(pressTimer===null&&loveHint.classList.contains('show')){loveHint.style.left=e.clientX+'px';loveHint.style.top=e.clientY+'px';}
});
workspace.addEventListener('mouseup',e=>{
  const isLove=loveHint.classList.contains('show');
  clearLovePreview();
  if(currentTool!=='stamp'||e.target.closest('.stamp-el')||e.target.closest('.draw-canvas'))return;
  if(Math.hypot(e.clientX-pressX,e.clientY-pressY)<8){deselectStamp();placeStamp(e.clientX,e.clientY,isLove?'love':'like');}
});
workspace.addEventListener('mouseleave',()=>clearLovePreview());

// Mobile touch — use Date.now() comparison at touchend, no stuck-state bug possible
let tapAt=0, tapX=0, tapY=0, tapMoved=false;

workspace.addEventListener('touchstart',e=>{
  if(e.touches.length>1){wasPinch=true;clearLovePreview();return;}
  if(currentTool!=='stamp')return;
  if(e.target.closest('.stamp-el')||e.target.closest('.draw-canvas'))return;
  tapAt=Date.now(); tapMoved=false;
  tapX=e.touches[0].clientX; tapY=e.touches[0].clientY;
  clearLovePreview();
  pressTimer=setTimeout(()=>showLovePreview(tapX,tapY),LOVE_MS);
},{passive:true});

workspace.addEventListener('touchmove',e=>{
  if(e.touches.length>1){wasPinch=true;clearLovePreview();return;}
  if(Math.hypot(e.touches[0].clientX-tapX,e.touches[0].clientY-tapY)>10){tapMoved=true;clearLovePreview();}
},{passive:true});

workspace.addEventListener('touchend',e=>{
  const held=(Date.now()-tapAt)>=LOVE_MS; // true if finger held long enough for love
  clearLovePreview();
  if(wasPinch){wasPinch=false;return;}
  if(tapMoved||e.touches.length>0)return;
  if(currentTool!=='stamp')return;
  if(e.target.closest('.stamp-el')||e.target.closest('.draw-canvas'))return;
  const t=e.changedTouches[0];
  if(Math.hypot(t.clientX-tapX,t.clientY-tapY)>12)return;
  deselectStamp();
  placeStamp(t.clientX,t.clientY,held?'love':'like');
},{passive:true});

workspace.addEventListener('touchcancel',()=>{clearLovePreview();wasPinch=false;tapMoved=true;},{passive:true});

// Pen
document.querySelectorAll('.draw-canvas').forEach(canvas=>{
  canvas.addEventListener('mousedown',startDraw); canvas.addEventListener('mousemove',continueDraw);
  canvas.addEventListener('mouseup',stopDraw); canvas.addEventListener('mouseleave',stopDraw);
  canvas.addEventListener('touchstart',startDraw,{passive:false});
  canvas.addEventListener('touchmove',continueDraw,{passive:false});
  canvas.addEventListener('touchend',stopDraw);
});
function getCanvasPos(canvas,cx,cy){const r=canvas.getBoundingClientRect();return{x:cx-r.left,y:cy-r.top};}
function startDraw(e){
  if(currentTool!=='pen')return; if(e.cancelable)e.preventDefault();
  activeCanvas=e.currentTarget; activeCtx=activeCanvas.getContext('2d'); isDrawing=true;
  const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
  const pos=getCanvasPos(activeCanvas,cx,cy); lastPos=pos;
  currentStroke={color:PERSONS[currentPerson].color,width:6,points:[pos],panelId:activeCanvas.closest('.day-panel').id};
  activeCtx.beginPath(); activeCtx.arc(pos.x,pos.y,3,0,Math.PI*2); activeCtx.fillStyle=currentStroke.color; activeCtx.fill();
}
function continueDraw(e){
  if(!isDrawing||!activeCtx)return; if(e.cancelable)e.preventDefault();
  const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
  const pos=getCanvasPos(activeCanvas,cx,cy);
  activeCtx.beginPath(); activeCtx.moveTo(lastPos.x,lastPos.y); activeCtx.lineTo(pos.x,pos.y);
  activeCtx.strokeStyle=currentStroke.color; activeCtx.lineWidth=6; activeCtx.lineCap=activeCtx.lineJoin='round'; activeCtx.stroke();
  lastPos=pos; currentStroke.points.push(pos);
}
function stopDraw(){
  if(!isDrawing)return; isDrawing=false;
  if(currentStroke?.points.length){const pid=currentStroke.panelId;if(!strokes[pid])strokes[pid]=[];strokes[pid].push(currentStroke);localHistory.push({type:'stroke',panelId:pid,idx:strokes[pid].length-1});redoStack=[];}
  currentStroke=null; lastPos=null; activeCanvas=null; activeCtx=null;
}

function undo(){
  const last=localHistory.pop(); if(!last)return; redoStack.push(last);
  if(last.type==='stroke'){strokes[last.panelId]?.splice(last.idx,1);redrawCanvas(document.getElementById(last.panelId));}
  else if(last.type==='stamp'){if(stampsRef&&!last.id.startsWith('local_')){syncDot.className='syncing';stampsRef.child(last.id).remove().then(()=>syncDot.className='');}else document.querySelector(`[data-id="${last.id}"]`)?.remove();}
}
function redo(){const last=redoStack.pop();if(!last)return;localHistory.push(last);}

function copyStamp(id){
  const el=document.querySelector(`[data-id="${id}"]`); if(!el)return;
  const isLike=!!el.querySelector('.like-stamp');
  const person=el.dataset.person||el.querySelector('.like-stamp')?.textContent?.trim();
  if(person&&PERSONS[person]){clipboardStamp={person,type:isLike?'like':'love'};toast('Copied — Ctrl+V to paste');}
}
function pasteStamp(){
  if(!clipboardStamp)return;
  const data={...clipboardStamp,day:currentDay,px:45+(Math.random()-.5)*10,py:45+(Math.random()-.5)*10};
  if(stampsRef){syncDot.className='syncing';const ref=stampsRef.push(data);localHistory.push({type:'stamp',id:ref.key});ref.then(()=>syncDot.className='');}
  else{const s={...data,id:'local_'+Date.now()};renderStampEl(s);localHistory.push({type:'stamp',id:s.id});}
}

document.addEventListener('keydown',e=>{
  if((e.key==='Delete'||e.key==='Backspace')&&document.activeElement===document.body&&selectedStampId){e.preventDefault();contextStampId=selectedStampId;selectedStampId=null;deleteContextStamp();return;}
  const ctrl=e.ctrlKey||e.metaKey; if(!ctrl)return;
  switch(e.key.toLowerCase()){
    case 'z':e.preventDefault();e.shiftKey?redo():undo();break;
    case 'y':e.preventDefault();redo();break;
    case 'c':if(contextStampId){e.preventDefault();copyStamp(contextStampId);}break;
    case 'v':if(clipboardStamp){e.preventDefault();pasteStamp();}break;
  }
});

let toastTimer;
function toast(msg,dur=2500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),dur);}
</script>
</body>
</html>
